<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zenit Finance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0f172a; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .wrap { text-align: center; padding: 32px 24px; animation: up .35s ease both; }
    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }
    .icon {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      background: #022c22; box-shadow: 0 0 32px #10b98120;
    }
    h1 { color: #f1f5f9; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p  { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="#34d399" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>¡Conectado!</h1>
    <p>Volviendo a Zenit Finance...</p>
  </div>

  <script>
    var params  = window.location.search;
    var baseUrl = 'https://fwglnespvqdujsbozmjz.supabase.co/functions/v1/google-oauth-redirect';

    // 1. Notifica a Supabase para que el polling funcione.
    //    keepalive:true garantiza que el request termine aunque el usuario
    //    navegue a otro lugar antes de que termine la respuesta.
    try {
      fetch(baseUrl + params, { mode: 'no-cors', keepalive: true });
    } catch (e) {
      navigator.sendBeacon && navigator.sendBeacon(baseUrl + params);
    }

    // 2. Vuelve a la app Android via deep link (300 ms dan tiempo al fetch).
    setTimeout(function () {
      window.location.href = 'com.zenitapp.finance://oauth2redirect' + params;
    }, 300);
  </script>
</body>
</html>
